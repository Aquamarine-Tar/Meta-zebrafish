,[16.894167,27.171857,125.278574],[16.189061,17.344327,106.414671],[27.317744,13.447741,51.63627],[11.278175,16.041784,32.281572],[19.372266,15.345076,55.34586],[21.328289,8.606015,40.983696],[19.965079,8.257531,58.122969],[15.086228,22.112533,71.963356],[15.502671,15.365386,5.994799],[15.841061,13.35474,60.327931],[23.852846,20.044503,31.471603],[7.52451,19.849594,16.868521],[9.099617,21.371345,26.732515],[21.86792,23.120811,12.991794],[22.006988,11.385515,13.138834],[19.137487,22.642336,96.833815],[13.535253,17.644074,5.53702],[22.420004,20.757977,9.986387],[16.778915,22.107692,20.301654],[18.493504,6.56483,16.80887],[10.367013,12.490037,53.273201],[19.396463,10.182374,46.209451],[10.3884,10.036911,16.740072],[23.029456,10.081138,11.203396],[16.558696,22.768985,40.485307],[17.497941,17.787074,85.28748],[10.522732,13.646708,46.343171],[9.662387,9.181572,31.67779],[10.433753,8.370332,15.814067],[23.731493,7.105245,45.770989],[22.393593,13.063974,9.417494],[27.813263,20.024707,27.699684],[16.758827,31.180364,59.666394],[21.021597,16.240319,22.058109],[8.493081,9.726247,33.755656],[17.270607,26.314541,117.905431],[17.74809,25.722775,26.32971],[14.779645,26.989358,71.942248],[22.741676,18.683967,57.099327],[17.448346,15.646769,100.583326],[4.003438,17.329985,17.378565],[15.912198,29.059748,60.419998],[13.883769,22.932,123.884693],[22.080747,10.768938,11.916003],[19.829954,22.733315,19.717453],[14.393123,27.14123,110.901896],[22.900559,8.8404,26.784153],[15.557102,17.191952,16.475129],[5.852189,15.521077,46.582961],[11.62388,11.415511,30.916804],[17.897317,17.723908,102.939727],[19.99859,28.876474,68.960779],[14.652812,26.822225,45.22531],[11.878264,8.137993,15.646691],[19.421358,8.785713,62.087607],[15.797191,28.119255,45.730738],[19.293465,25.970324,56.840683],[16.796782,25.426288,24.452188],[10.135282,14.801457,45.314646],[9.351324,13.445855,12.554702],[19.348633,16.921113,71.825486],[31.870771,13.653096,23.167495],[12.581166,8.251498,53.212628],[25.7643,14.8884,51.251506],[25.050228,14.613966,53.304781],[16.911392,29.900055,60.753777],[3.452537,16.301744,21.745421],[12.444992,8.933521,14.532503],[19.940914,10.348364,13.699059],[16.653783,28.874574,124.954418],[24.891589,7.839704,32.7728],[17.845296,24.70311,118.296409],[15.4188,30.288065,113.195585],[24.185617,16.459761,49.795038],[14.462552,25.412895,102.378438],[3.388502,15.929177,18.176461],[10.088816,9.507733,15.713961],[23.752671,21.164704,11.712305],[6.426134,15.642328,46.590477],[18.120324,16.457051,103.578846],[10.798767,15.685652,43.776824],[8.474091,14.070019,12.415049],[11.501864,12.935372,12.935346],[24.000081,16.20503,53.372338],[16.605063,31.284806,62.058179],[20.594685,9.199449,14.904744],[11.271353,9.489004,16.071606],[20.022677,10.867306,15.476732],[12.071423,11.427387,16.681506],[18.094003,11.798053,16.957967]],"center":[17.44439917,18.26925634,55.85360421],"axis":[-0.0194857568,0.1184924327,0.9927637426],"sMin":-53.27250997227994,"sMax":74.9543598131397,"bboxMin":[1.45435677,1.77612076,2.4081501],"bboxMax":[35.08007507,32.4072052,130.70891113]};
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
const hoverBox = document.getElementById('hover');
const markersBody = document.getElementById('markers');

let dpr = window.devicePixelRatio || 1;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = false;
let last = null;
let markers = [];

const pts = data.points.map(p => ({x:p[0], z:p[1]}));
const cx = data.center[0];
const cz = data.center[2];
const ax = data.axis[0];
const az = data.axis[2];
const axisLen2 = ax * ax + az * az;
const sMin = data.sMin;
const sMax = data.sMax;

info.textContent =
`source: ${data.source}
vertices: ${pts.length}
bbox min xyz: ${data.bboxMin.map(v => v.toFixed(4)).join(', ')}
bbox max xyz: ${data.bboxMax.map(v => v.toFixed(4)).join(', ')}
center xyz: ${data.center.map(v => v.toFixed(4)).join(', ')}
PCA axis xyz: ${data.axis.map(v => v.toFixed(5)).join(', ')}
s range: ${sMin.toFixed(4)} .. ${sMax.toFixed(4)}`;

function resize() {
  const rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function fit() {
  const rect = canvas.getBoundingClientRect();
  const xs = pts.map(p => p.x);
  const zs = pts.map(p => p.z);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minZ = Math.min(...zs), maxZ = Math.max(...zs);
  const pad = 36;
  scale = Math.min((rect.width - 2 * pad) / (maxX - minX), (rect.height - 2 * pad) / (maxZ - minZ));
  offsetX = pad - minX * scale;
  offsetY = rect.height - pad + minZ * scale;
  draw();
}

function worldToScreen(x, z) {
  return {x: x * scale + offsetX, y: -z * scale + offsetY};
}

function screenToWorld(x, y) {
  return {x: (x - offsetX) / scale, z: -(y - offsetY) / scale};
}

function axisS(x, z) {
  return ((x - cx) * ax + (z - cz) * az) / Math.sqrt(axisLen2);
}

function axisUFromS(s) {
  return (s - sMin) / (sMax - sMin);
}

function axisPointFromS(s) {
  const norm = Math.sqrt(axisLen2);
  return {x: cx + (s / norm) * ax, z: cz + (s / norm) * az};
}

function drawGrid(rect) {
  const stepWorld = niceStep(90 / scale);
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(rect.width, rect.height);
  const minX = Math.floor(topLeft.x / stepWorld) * stepWorld;
  const maxX = Math.ceil(bottomRight.x / stepWorld) * stepWorld;
  const minZ = Math.floor(bottomRight.z / stepWorld) * stepWorld;
  const maxZ = Math.ceil(topLeft.z / stepWorld) * stepWorld;
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#e8edf4';
  ctx.fillStyle = '#667383';
  ctx.font = '11px Arial';
  for (let x = minX; x <= maxX; x += stepWorld) {
    const a = worldToScreen(x, minZ), b = worldToScreen(x, maxZ);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.fillText(x.toFixed(1), a.x + 3, rect.height - 8);
  }
  for (let z = minZ; z <= maxZ; z += stepWorld) {
    const a = worldToScreen(minX, z), b = worldToScreen(maxX, z);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    ctx.fillText(z.toFixed(1), 8, a.y - 3);
  }
}

function niceStep(raw) {
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const v = raw / pow;
  if (v < 2) return pow;
  if (v < 5) return 2 * pow;
  return 5 * pow;
}

function draw() {
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  drawGrid(rect);

  ctx.fillStyle = 'rgba(30, 100, 160, 0.45)';
  for (const p of pts) {
    const q = worldToScreen(p.x, p.z);
    ctx.fillRect(q.x - 1.1, q.y - 1.1, 2.2, 2.2);
  }

  const a = axisPointFromS(sMin);
  const b = axisPointFromS(sMax);
  const as = worldToScreen(a.x, a.z);
  const bs = worldToScreen(b.x, b.z);
  ctx.strokeStyle = '#d12d2d';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(as.x, as.y); ctx.lineTo(bs.x, bs.y); ctx.stroke();
  ctx.fillStyle = '#d12d2d';
  ctx.font = '12px Arial';
  ctx.fillText('PCA axis  u=0', as.x + 6, as.y - 6);
  ctx.fillText('u=1', bs.x + 6, bs.y - 6);

  for (let i = 0; i < markers.length; i++) {
    const m = markers[i];
    const p = axisPointFromS(m.s);
    const nx = -az / Math.sqrt(axisLen2);
    const nz = ax / Math.sqrt(axisLen2);
    const len = 300;
    const p0 = worldToScreen(p.x - nx * len, p.z - nz * len);
    const p1 = worldToScreen(p.x + nx * len, p.z + nz * len);
    ctx.strokeStyle = '#111827';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
    ctx.setLineDash([]);
    const ps = worldToScreen(p.x, p.z);
    ctx.fillStyle = '#111827';
    ctx.beginPath(); ctx.arc(ps.x, ps.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillText(`${i + 1} u=${m.u.toFixed(3)}`, ps.x + 7, ps.y - 7);
  }
}

function updateMarkers() {
  markersBody.innerHTML = markers.map((m, i) =>
    `<tr><td>${i + 1}</td><td>${m.u.toFixed(4)}</td><td>${m.s.toFixed(3)}</td><td>${m.x.toFixed(3)}</td><td>${m.z.toFixed(3)}</td></tr>`
  ).join('');
}

canvas.addEventListener('mousedown', e => {
  dragging = true;
  last = {x: e.clientX, y: e.clientY, moved: false};
});

window.addEventListener('mouseup', e => {
  if (!dragging || !last) return;
  const moved = last.moved;
  dragging = false;
  if (!moved && e.target === canvas) {
    const rect = canvas.getBoundingClientRect();
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const s = axisS(w.x, w.z);
    const u = axisUFromS(s);
    markers.push({x: w.x, z: w.z, s, u});
    markers.sort((a, b) => a.s - b.s);
    updateMarkers();
    draw();
  }
});

window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  if (dragging && last) {
    const dx = e.clientX - last.x;
    const dy = e.clientY - last.y;
    if (Math.hypot(dx, dy) > 2) last.moved = true;
    offsetX += dx;
    offsetY += dy;
    last.x = e.clientX;
    last.y = e.clientY;
    draw();
  }
  if (e.target === canvas) {
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const s = axisS(w.x, w.z);
    const u = axisUFromS(s);
    hoverBox.textContent = `x: ${w.x.toFixed(4)}\nz: ${w.z.toFixed(4)}\ns: ${s.toFixed(4)}\nu: ${u.toFixed(4)}`;
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mouse = {x: e.clientX - rect.left, y: e.clientY - rect.top};
  const before = screenToWorld(mouse.x, mouse.y);
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  scale *= factor;
  const after = worldToScreen(before.x, before.z);
  offsetX += mouse.x - after.x;
  offsetY += mouse.y - after.y;
  draw();
}, {passive: false});

document.getElementById('fit').addEventListener('click', fit);
document.getElementById('clear').addEventListener('click', () => {
  markers = [];
  updateMarkers();
  draw();
});

window.addEventListener('resize', resize);
resize();
fit();
</script>
